# Auto-loaded by `docker compose up` for local development. Swaps the nginx
# image for a plain one serving the Nuxt dev server, switches php/queue to
# their bind-mounted dev target, and adds the node dev-server container.
services:
  nginx:
    build: !reset null
    image: nginx:1.30-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/app.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - node

  php:
    build:
      target: dev
    volumes:
      - ./backend:/var/www/html

  queue:
    build:
      target: dev
    volumes:
      - ./backend:/var/www/html

  mariadb:
    ports:
      - "3306:3306"

  redis:
    ports:
      - "6379:6379"

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules
    networks: [app]

  # Local mail catcher: php/queue send over SMTP to mailpit:1025 (see
  # backend/.env) and every message is captured — nothing leaves the machine.
  # Read the inbox at http://localhost:${MAILPIT_PORT} (default 8025).
  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
    networks: [app]

  # Local S3-compatible object storage (dev only). Laravel's `s3` disk points at
  # http://minio:9000 (backend/.env AWS_* + FILESYSTEM_DISK=s3), so profile avatars
  # round-trip through real S3 semantics without touching AWS — nothing leaves
  # the machine. PHP reads/writes over the internal network; the browser never
  # contacts MinIO (avatars are streamed through the authenticated API route), so
  # no bucket is public and no CORS is needed. Web console:
  # http://localhost:${MINIO_CONSOLE_PORT:-9001} (login minioadmin / minioadmin).
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks: [app]

  # One-shot: waits for MinIO, creates the app bucket (idempotent), then exits.
  # Keeps the bucket from having to be created by hand on first boot.
  createbuckets:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      until mc alias set h http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo 'waiting for minio...'; sleep 1; done;
      mc mb --ignore-existing h/${AWS_BUCKET:-larnux};
      echo 'minio bucket ready';
      "
    networks: [app]

volumes:
  node-modules:
  minio-data:
