# Explicit prod overlay: `docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build`
# docker-compose.yml is already prod-leaning by default (static nginx build,
# no node service) — this file just adds restart policies dev doesn't want.
services:
  nginx:
    restart: unless-stopped

  php:
    restart: unless-stopped

  queue:
    restart: unless-stopped

  mariadb:
    restart: unless-stopped

  redis:
    restart: unless-stopped
