server {
    listen 80;
    server_name _;

    # Resolve upstreams at request time (not config-load time) via Docker's
    # embedded DNS — otherwise nginx refuses to start if php/node aren't
    # already up yet, which breaks a plain `docker compose up` cold start.
    resolver 127.0.0.11 valid=10s;

    # Laravel is the same PHP front controller for every one of these paths —
    # /sanctum/csrf-cookie and /up live outside /api but still need PHP, and
    # /horizon is the Horizon dashboard (its assets are inlined, so no separate
    # asset path is needed) — otherwise these would fall through to the SPA.
    location ~ ^/(api|sanctum|up|horizon) {
        set $php php:9000;
        include fastcgi_params;
        fastcgi_pass $php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    }

    # Nuxt dev server (HMR over websocket).
    location / {
        set $node node:3000;
        proxy_pass http://$node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
