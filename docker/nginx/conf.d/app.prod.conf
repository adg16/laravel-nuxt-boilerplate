server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolve php at request time (not config-load time) via Docker's
    # embedded DNS — otherwise nginx refuses to start if php isn't already
    # up yet, which breaks a plain `docker compose up -d --build` cold start.
    resolver 127.0.0.11 valid=10s;

    # Laravel is the same PHP front controller for every one of these paths —
    # /sanctum/csrf-cookie and /up live outside /api but still need PHP.
    location ~ ^/(api|sanctum|up) {
        set $php php:9000;
        include fastcgi_params;
        fastcgi_pass $php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    }

    # Static Nuxt SPA build; fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
